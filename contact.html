<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | STEM Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header-flex">
            <div class="logo">My Portfolio</div>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="hero-text">
                <h1>Get In Touch</h1>
                <p>Have questions about the study data analysis or the website design? Send a message below.</p>
                
                <form action="#" method="post" style="margin-top: 20px; text-align: left;">
                    <div style="margin-bottom: 15px;">
                        <label style="display:block; font-weight:bold;">Name</label>
                        <input type="text" name="name" style="width:100%; padding:10px; border:1px solid #ddd;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display:block; font-weight:bold;">Email</label>
                        <input type="email" name="email" style="width:100%; padding:10px; border:1px solid #ddd;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display:block; font-weight:bold;">Message</label>
                        <textarea name="message" rows="4" style="width:100%; padding:10px; border:1px solid #ddd;"></textarea>
                    </div>
                    <button type="submit" class="btn" style="background: #333; color: #fff; cursor: pointer;">Send Message</button>
                </form>
            </div>
            <div class="hero-image">
                <img src="images/10.jpg" alt="Contact Us">
            </div>
        </section>
    </main>

    <footer class="footer">2026</footer>
</body>
</html>
