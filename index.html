<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header-flex">
            <div class="logo">My Portfolio</div>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="hero-text">
                <h1>Data and Design</h1>
                <p>Clean layout, responsive grid, no frameworks.</p>
                <a class="btn" href="gallery.html">See Gallery</a>
            </div>
            <div class="hero-card">
                <p>KPI</p>
                <h2>72%</h2>
            </div>
        </section>

        <section class="plot-section">
            <img src="plot.png" alt="Data Visualization" style="width:100%; max-width:800px; display:block; margin: 20px auto;">
        </section>

        <section class="grid">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
            <div class="card">Card 4</div>
        </section>
    </main>

    <footer class="footer">2026</footer>
</body>
</html>
